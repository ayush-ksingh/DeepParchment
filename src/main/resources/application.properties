# Application
spring.application.name=basic-rag-system

# Multipart File Upload Properties
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Database Configuration (PostgreSQL/pgvector)
spring.datasource.url=jdbc:postgresql://localhost:5432/pdf_db
spring.datasource.username=researcher
spring.datasource.password=system_design
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring AI Vector Store (pgvector)
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1024

# Spring AI Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434

# Ollama Chat Model settings
spring.ai.ollama.chat.options.model=qwen3.5:9b

# Ollama Embedding Model settings
spring.ai.ollama.embedding.options.model=mxbai-embed-large
